background            #1b2d40
foreground            #d6e2ee
background_opacity 0.3
dynamic_background_opacity yes

# black
color0  #1b2d40
color8  #4A6B80

# red
color1  #4d86b0
color9  #73a6cb

# green
color2  #5e95bc
color10 #86b7d8

# yellow
color3  #6fa4c9
color11 #9dcae5

# blue
color4  #6fb8e3
color12 #f2fcff

# magenta
color5  #8bc9eb
color13 #b1d8ee

#cyan
color6  #b4e4f6
color14 #d1eef8

#white
color7  #d6e2ee
color15 #ffffff

cursor_shape block
cursor_blink_interval 0.6 ease-in-out
cursor_stop_blinking_after 0

cursor_trail 8
cursor_trail_decay 0.08 0.25
cursor_trail_start_threshold 1
cursor_trail_color #f2fcff
