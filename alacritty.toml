[colors.primary]
background = "#1b2d40"
foreground = "#d6e2ee"

[colors.normal]
black   = "#1b2d40"
red     = "#4d86b0"
green   = "#5e95bc"
yellow  = "#6fa4c9"
blue    = "#6fb8e3"
magenta = "#8bc9eb"
